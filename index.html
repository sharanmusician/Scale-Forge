<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale Forge | Editor Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0b0b0d] text-gray-200 min-h-screen flex flex-col font-sans">

    <!-- Top Bar -->
    <header class="bg-[#111114] border-b border-white/[0.04] px-6 py-3 flex justify-between items-center">
        <span class="text-white font-bold text-xs">SCALE FORGE</span>
        <button id="replace-photo-btn" class="hidden text-[11px] bg-white/[0.03] border border-white/[0.08] px-3 py-1.5 rounded-lg">Import New Media</button>
        <input type="file" id="image-input" accept="image/*" class="hidden">
    </header>

    <main class="flex-grow p-4 grid grid-cols-12 gap-4">
        <!-- Main Stage (Top) -->
        <section class="col-span-5 bg-[#141417] rounded-xl p-4 flex flex-col gap-4">
            <h2 class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Aspect Ratio</h2>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setRatio('1:1', 1)" class="ratio-btn bg-[#1b1b1f] p-3 rounded-lg flex items-center gap-3 text-xs">
                    <div class="w-4 h-4 border-2 border-current rounded-[3px]"></div> 1:1
                </button>
                <button onclick="setRatio('16:9', 16/9)" class="ratio-btn bg-[#1b1b1f] p-3 rounded-lg flex items-center gap-3 text-xs">
                    <div class="w-5 h-3 border-2 border-current rounded-[3px]"></div> 16:9
                </button>
                <button onclick="setRatio('9:16', 9/16)" class="ratio-btn bg-[#1b1b1f] p-3 rounded-lg flex items-center gap-3 text-xs">
                    <div class="w-3 h-5 border-2 border-current rounded-[3px]"></div> 9:16
                </button>
                <button onclick="setRatio('4:3', 4/3)" class="ratio-btn bg-[#1b1b1f] p-3 rounded-lg flex items-center gap-3 text-xs">
                    <div class="w-4 h-3 border-2 border-current rounded-[3px]"></div> 4:3
                </button>
            </div>
        </section>

        <!-- Preview Monitor (Top) -->
        <section class="col-span-7 bg-black rounded-xl flex items-center justify-center p-4">
            <div id="upload-placeholder" class="text-center cursor-pointer" onclick="document.getElementById('image-input').click()">
                <p class="text-[10px] text-gray-500 uppercase">Tap to Load Media</p>
            </div>
            <div id="canvas-container" class="hidden relative max-w-full max-h-full">
                <div id="blur-bg" class="absolute inset-0 blur-2xl transition-all"></div>
                <div id="solid-bg" class="absolute inset-0"></div>
                <img id="preview-img" src="" class="relative max-h-[300px]">
            </div>
        </section>

        <!-- Bottom Matrix (Controls) -->
        <section class="col-span-12 bg-[#141417] rounded-xl p-4 flex items-center gap-6">
            <div id="mini-preview-container" class="w-[120px] h-[80px] bg-black border border-white/10 flex items-center justify-center">
                <img id="mini-preview-img" src="" class="hidden max-h-full">
            </div>
            
            <div class="flex-grow flex gap-4">
                <div class="flex flex-col gap-2">
                    <div class="flex gap-2">
                        <button onclick="setBgType('blur')" class="text-[10px] bg-[#1b1b1f] px-4 py-2 rounded">Blur</button>
                        <button onclick="setBgType('solid')" class="text-[10px] bg-[#1b1b1f] px-4 py-2 rounded">Chroma</button>
                    </div>
                    <input type="range" id="blur-slider" min="0" max="100" value="24" class="w-[200px]">
                </div>
                
                <div id="color-picker-wrapper" class="hidden flex items-center gap-4">
                    <canvas id="wheel-canvas" width="60" height="60" class="rounded-full"></canvas>
                    <input type="range" id="opacity-slider" min="0" max="100" value="100">
                </div>
            </div>

            <button id="download-btn" disabled class="bg-indigo-600 px-6 py-3 rounded-lg text-xs font-bold disabled:opacity-30">EXPORT</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
